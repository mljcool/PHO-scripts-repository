<HTML><HEAD>
<STYLE type=text/css>
		body
		{
			font-family:Segoe UI;
			margin:0px;
			background-color:#f6f8fa;
		}
		td
		{
			padding-left:5px;
		}
		</STYLE>

<SCRIPT type=text/javascript>
			function getDataParam(index){
				//Get the any query string parameters and load them
				//into the vals array
				
				var vals = new Array();
				if(location.search != ""){
					vals = location.search.substr(1).split("&");
					for(var i in vals){
						vals[i] = vals[i].replace(/\+/g, " ").split("=");
					}
					//look for the parameter named 'data'
					var found = false;
					for(var i in vals){
						if(vals[i][0].toLowerCase() == "data"){
							return _parseDataValue(vals[i][1], index);
							found = true;
							break;
						}
					}
					if( ! found){
						return - 1;
					}
				}
				else{
					return - 1;
				}
			}

			function _parseDataValue(datavalue, index){
				if(datavalue != ""){
					var vals = new Array();
					
					vals = decodeURIComponent(datavalue).split("&");
					for(var i in vals){
						vals[i] = vals[i].replace(/\+/g, " ").split("=");
					}
					return vals[index][1];
				}
				else{
					return - 1;
				}
			}
		
			function initialiseAlertMessage()
			{
				 document.getElementById("image").src = parent.Xrm.Page.context.prependOrgName("/WebResources/new_Notification.PNG");
				 document.getElementById("message").innerHTML = getDataParam(0);
			}
		</SCRIPT>

<META charset=utf-8></HEAD>
<BODY onload=initialiseAlertMessage()>
<TABLE style="BORDER-BOTTOM: #9999cc 1px solid; BORDER-LEFT: #9999cc 1px solid; BACKGROUND-COLOR: #feefb3; BORDER-TOP: #9999cc 1px solid; BORDER-RIGHT: #9999cc 1px solid" cellSpacing=1 cellPadding=1>
<TBODY>
<TR>
<TD><IMG id=image align=middle src=""> </TD>
<TD style="WIDTH: 100%; HEIGHT: auto"><SPAN style="FONT-SIZE: 13px" id=message><!--Parameter passed to the initialiseMessage JavaScript will display here as the alert message--></SPAN></TD></TR></TBODY></TABLE></BODY></HTML>
